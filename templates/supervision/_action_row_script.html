<script>
  function addActionRow() {
    const container = document.getElementById('actionRows');
    if (!container) return;

    const row = document.createElement('div');
    row.className = 'rounded-xl border border-slate-200 bg-slate-50 p-4';

    row.innerHTML = `
      <div class="grid grid-cols-1 gap-3 md:grid-cols-5">
        <div class="md:col-span-2">
          <label class="block text-xs font-semibold uppercase tracking-wide text-slate-500">Action</label>
          <textarea name="action_description[]" rows="2"
                    class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm focus:border-ellipse-teal focus:outline-none focus:ring-2 focus:ring-ellipse-teal/20"
                    placeholder="Describe the agreed action"></textarea>
        </div>

        <div>
          <label class="block text-xs font-semibold uppercase tracking-wide text-slate-500">Owner Type</label>
          <select name="action_owner_type[]"
                  class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm focus:border-ellipse-teal focus:outline-none focus:ring-2 focus:ring-ellipse-teal/20">
            <option value="Employee">Employee</option>
            <option value="Manager">Manager</option>
            <option value="HR">HR</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div>
          <label class="block text-xs font-semibold uppercase tracking-wide text-slate-500">Owner Name</label>
          <input type="text" name="action_owner_name[]"
                 class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm focus:border-ellipse-teal focus:outline-none focus:ring-2 focus:ring-ellipse-teal/20"
                 placeholder="Optional">
        </div>

        <div>
          <label class="block text-xs font-semibold uppercase tracking-wide text-slate-500">Due Date</label>
          <input type="date" name="action_due_date[]"
                 class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm focus:border-ellipse-teal focus:outline-none focus:ring-2 focus:ring-ellipse-teal/20">
        </div>
      </div>

      <div class="mt-3 flex justify-end">
        <button type="button"
                onclick="this.closest('.rounded-xl').remove()"
                class="text-xs font-medium text-rose-600 hover:underline">
          Remove action
        </button>
      </div>
    `;

    container.appendChild(row);
  }
</script>
